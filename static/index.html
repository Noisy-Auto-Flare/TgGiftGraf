<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --border-color: rgba(51, 65, 85, 0.5);
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            padding: 0.75rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }
        .search-container {
            position: relative;
            width: 320px;
        }
        input#search {
            width: 100%;
            padding: 0.6rem 1.25rem;
            border-radius: 9999px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all 0.2s;
            outline: none;
        }
        input#search:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: rgba(255, 255, 255, 0.08);
        }
        #search-results {
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            z-index: 1000;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .search-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: background 0.2s;
        }
        .search-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .search-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #334155;
        }
        .search-item .info {
            display: flex;
            flex-direction: column;
        }
        .search-item .name { font-weight: 500; font-size: 0.875rem; }
        .search-item .username { font-size: 0.75rem; color: var(--text-secondary); }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        #graph-container {
            flex: 1;
            background: transparent;
        }
        #sidebar {
            width: 380px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-left: 1px solid var(--glass-border);
            padding: 1.5rem;
            overflow-y: auto;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            padding: 1.25rem;
        }
        .card h4 {
            margin: 0 0 1rem 0;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .stat-item .label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .stat-item .value {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--accent-color);
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .user-profile img {
            width: 64px;
            height: 64px;
            border-radius: 1.25rem;
            background: #334155;
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }
        .user-profile .names h3 {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
        }
        .user-profile .names p {
            margin: 0;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        td {
            padding: 0.75rem 0.5rem;
            font-size: 0.875rem;
            border-top: 1px solid var(--glass-border);
        }
        .rank { font-weight: 600; color: var(--text-secondary); width: 30px; }
        .reach-val { font-weight: 600; text-align: right; color: var(--accent-color); }
        
        .controls {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            display: flex;
            gap: 0.75rem;
            z-index: 100;
        }
        .btn {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1.25rem;
            border-radius: 9999px;
            color: var(--text-primary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
        .btn.active {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .btn.loading::after {
            content: '';
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 1rem;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: var(--text-secondary); font-size: 0.875rem;">Загрузка графа...</p>
    </div>
    <header>
        <div class="logo">GIFT GRAPH</div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Поиск по имени или @username..." autocomplete="off">
            <div id="search-results"></div>
        </div>
    </header>
    <main>
        <div id="graph-container"></div>
        <div class="controls">
            <button class="btn active" id="btn-local" onclick="switchMode('local')">
                <span>📍</span> Локальный
            </button>
            <button class="btn" id="btn-global" onclick="switchMode('global')">
                <span>🌐</span> Общий граф
            </button>
            <button class="btn" id="btn-analytics" onclick="runAnalytics()" title="Пересчитать охваты и кластеры">
                <span>📊</span> Аналитика
            </button>
        </div>
        <aside id="sidebar">
            <div id="user-info-panel" style="display: none;">
                <div class="user-profile">
                    <img id="user-photo" src="" alt="">
                    <div class="names">
                        <h3 id="user-name">Имя</h3>
                        <p id="user-handle">@username</p>
                    </div>
                </div>
                <div class="card">
                    <h4>Статистика узла</h4>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="label">Получено</div>
                            <div class="value" id="stat-incoming">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="label">Отправлено</div>
                            <div class="value" id="stat-outgoing">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="label">Соседей</div>
                            <div class="value" id="stat-neighbors">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="label">Охват (5 ш.)</div>
                            <div class="value" id="stat-reach">0</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="placeholder-info">
                <h3>Анализ связей</h3>
                <p style="color: var(--text-secondary); font-size: 0.875rem;">Выберите пользователя на графе или воспользуйтесь поиском, чтобы увидеть детальную статистику подарков.</p>
            </div>

            <div class="card">
                <h4>База данных</h4>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="label">Узлов</div>
                        <div class="value" id="total-users">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="label">Связей</div>
                        <div class="value" id="total-edges">0</div>
                    </div>
                </div>
            </div>

            <div class="card" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">
                <h4>Топ охвата</h4>
                <div style="overflow-y: auto; flex: 1;">
                    <table id="top-reach-table">
                        <thead>
                            <tr>
                                <th class="rank">#</th>
                                <th>Пользователь</th>
                                <th style="text-align: right;">Охват</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </aside>
    </main>

    <script>
        let network = null;
        let currentMode = 'local'; // 'local' or 'global'
        const colorPalette = ['#38bdf8', '#818cf8', '#a78bfa', '#fb7185', '#fb923c', '#facc15', '#4ade80'];

        const searchInput = document.getElementById('search');
        const searchResults = document.getElementById('search-results');

        // Поиск с debounce
        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const q = e.target.value;
            if (q.length < 2) {
                searchResults.style.display = 'none';
                return;
            }
            debounceTimer = setTimeout(async () => {
                const res = await fetch(`/api/users/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                renderSearchResults(data);
            }, 300);
        });

        function renderSearchResults(users) {
            searchResults.innerHTML = '';
            if (users.length === 0) {
                searchResults.style.display = 'none';
                return;
            }
            users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'search-item';
                const photo = user.has_photo ? `/avatars/${user.id}.jpg` : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.first_name || user.username);
                div.innerHTML = `
                    <img src="${photo}" onerror="this.src='https://ui-avatars.com/api/?name=?'">
                    <div class="info">
                        <div class="name">${user.first_name || 'Без имени'}</div>
                        <div class="username">${user.username ? '@' + user.username : 'ID: ' + user.id}</div>
                    </div>
                `;
                div.onclick = () => {
                    loadGraph(user.id);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                };
                searchResults.appendChild(div);
            });
            searchResults.style.display = 'block';
        }

        async function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-local').classList.toggle('active', mode === 'local');
            document.getElementById('btn-global').classList.toggle('active', mode === 'global');
            
            if (mode === 'global') {
                loadGlobalGraph();
            } else {
                // Load some default or last local
                const res = await fetch('/api/stats/top-reach?limit=1');
                const data = await res.json();
                if (data.length > 0) loadGraph(data[0].id);
            }
        }

        async function loadGlobalGraph() {
            const res = await fetch('/api/graph/global?limit=200');
            const data = await res.json();
            renderGraph(data.nodes, data.edges, true);
        }

        async function loadGraph(userId) {
            try {
                const res = await fetch(`/api/users/${userId}/graph`);
                const data = await res.json();
                renderGraph(data.nodes, data.edges, false);
                const user = data.nodes.find(n => n.id === data.stats.user_id);
                if (user) {
                    updateUserInfo(data.stats, user);
                }
            } catch (e) { console.error("Error loading graph:", e); }
        }

        async function runAnalytics() {
            const btn = document.getElementById('btn-analytics');
            btn.classList.add('loading', 'active');
            btn.disabled = true;
            try {
                const res = await fetch('/api/analytics/run', { method: 'POST' });
                if (res.ok) {
                    alert('Аналитика успешно выполнена! Обновите граф.');
                    updateSummary();
                    updateTopReach();
                }
            } catch (e) { console.error(e); }
            btn.classList.remove('loading', 'active');
            btn.disabled = false;
        }

        function updateUserInfo(stats, user) {
            document.getElementById('placeholder-info').style.display = 'none';
            document.getElementById('user-info-panel').style.display = 'block';
            
            document.getElementById('user-name').innerText = user.first_name || 'Без имени';
            document.getElementById('user-handle').innerText = user.username ? '@' + user.username : 'ID: ' + user.id;
            document.getElementById('user-photo').src = user.has_photo ? `/avatars/${user.id}.jpg` : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.first_name || user.username);
            
            document.getElementById('stat-incoming').innerText = stats.incoming_gifts;
            document.getElementById('stat-outgoing').innerText = stats.outgoing_gifts;
            document.getElementById('stat-neighbors').innerText = stats.neighbors;
            document.getElementById('stat-reach').innerText = stats.reach_5;
        }

        function renderGraph(nodesData, edgesData, isGlobal) {
            const nodes = new vis.DataSet(nodesData.map(node => {
                const photo = node.has_photo ? `/avatars/${node.id}.jpg` : null;
                return {
                    id: node.id,
                    label: node.label,
                    shape: photo ? 'circularImage' : 'dot',
                    image: photo,
                    size: isGlobal ? 20 : 30,
                    color: {
                        background: colorPalette[node.cluster % colorPalette.length] || '#38bdf8',
                        border: '#ffffff',
                        highlight: { background: '#38bdf8', border: '#ffffff' }
                    },
                    font: { color: '#f8fafc', size: 12, face: 'Inter', strokeWidth: 0 },
                    borderWidth: 2
                };
            }));

            const edges = new vis.DataSet(edgesData.map(edge => ({
                from: edge.from,
                to: edge.to,
                value: edge.weight,
                length: edge.length || (isGlobal ? 200 : 150),
                color: { color: 'rgba(148, 163, 184, 0.3)', highlight: '#38bdf8' },
                arrows: { to: { enabled: true, scaleFactor: 0.5 } },
                title: edge.title
            })));

            const container = document.getElementById('graph-container');
            const data = { nodes, edges };
            const options = {
                physics: {
                    stabilization: true,
                    barnesHut: {
                        gravitationalConstant: -2000,
                        springConstant: 0.04,
                        springLength: isGlobal ? 200 : 150
                    }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200
                }
            };

            if (network) network.destroy();
            network = new vis.Network(container, data, options);

            // Hide loading overlay after stabilization
            network.once("stabilizationIterationsDone", function() {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                }, 500);
            });
            
            // Fallback for small graphs where stabilization is instant
            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                }, 500);
            }, 2000);

            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    loadGraph(params.nodes[0]);
                }
            });
        }

        async function updateSummary() {
            try {
                const res = await fetch('/api/stats/summary');
                const data = await res.json();
                document.getElementById('total-users').innerText = data.total_users;
                document.getElementById('total-edges').innerText = data.total_edges;
            } catch (e) { console.error(e); }
        }

        async function updateTopReach() {
            const res = await fetch('/api/stats/top-reach?limit=10');
            const data = await res.json();
            const tbody = document.querySelector('#top-reach-table tbody');
            tbody.innerHTML = '';
            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.style.cursor = 'pointer';
                tr.onclick = () => loadGraph(item.id);
                const photo = item.has_photo ? `/avatars/${item.id}.jpg` : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(item.first_name || item.username);
                tr.innerHTML = `
                    <td class="rank">${index + 1}</td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <img src="${photo}" style="width: 24px; height: 24px; border-radius: 50%; background: #334155;">
                            <span>${item.first_name || item.username || 'ID: ' + item.id}</span>
                        </div>
                    </td>
                    <td class="reach-val">${item.reach_count}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Инициализация
        updateSummary();
        updateTopReach();
        
        // Load initial graph
        setTimeout(async () => {
            const res = await fetch('/api/stats/top-reach?limit=1');
            const data = await res.json();
            if (data.length > 0) loadGraph(data[0].id);
        }, 500);

        setInterval(updateSummary, 10000);
        setInterval(updateTopReach, 60000);
        
        // Close search results when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.style.display = 'none';
            }
        });
    </script>
</body>
</html>
